name: MediBook CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Fix test path and run tests
        working-directory: backend
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/medibook_test
          JWT_SECRET: test_secret_key_ci
          EMAIL_USER: test@test.com
          EMAIL_PASS: testpass
        run: |
          sed -i "s|require('./server.test-app')|require('../server.test-app')|g" tests/api.test.js
          npm test

  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

